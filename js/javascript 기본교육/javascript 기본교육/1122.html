    <script>
         // call, apply, bind
         Function.prototype.mybind = function(thiz) {
            //let func = this
            //return function(){func.call(thiz)};
            return ()=>this.call(thiz);
        }

        let o = {
            a:'1',
            f: function() {
                console.log(this.a);
            }
        };

        let p = {
            a:'2'
        };

        p.f = o.f;
        p.bf = o.f.bind(o);
        p.mbf = o.f.mybind(o);
    
    </script>
